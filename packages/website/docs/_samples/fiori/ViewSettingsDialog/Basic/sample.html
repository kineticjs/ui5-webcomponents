<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample</title>
</head>

<body style="background-color: var(--sapBackgroundColor); height: 400px;">
    <!-- playground-fold-end -->

    <ui5-button id="btnOpenDialog1">Open ViewSettingsDialog</ui5-button>

    <ui5-view-settings-dialog id="vsd1" sort-descending>
        <ui5-sort-item slot="sortItems" text="Name" selected=""></ui5-sort-item>
        <ui5-sort-item slot="sortItems" text="Position"></ui5-sort-item>
        <ui5-sort-item slot="sortItems" text="Company"></ui5-sort-item>
        <ui5-sort-item slot="sortItems" text="Department"></ui5-sort-item>
        <ui5-filter-item slot="filterItems" text="Position">
            <ui5-filter-item-option slot="values" text="CTO"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="CPO"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="VP"></ui5-filter-item-option>
        </ui5-filter-item>
        <ui5-filter-item slot="filterItems" text="Department">
            <ui5-filter-item-option slot="values" text="Sales"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="Management"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="PR"></ui5-filter-item-option>
        </ui5-filter-item>
        <ui5-filter-item slot="filterItems" text="Location">
            <ui5-filter-item-option slot="values" text="Walldorf"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="New York"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="London"></ui5-filter-item-option>
        </ui5-filter-item>
        <ui5-filter-item slot="filterItems" text="Reports to">
            <ui5-filter-item-option slot="values" text="CTO"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="CPO"></ui5-filter-item-option>
            <ui5-filter-item-option slot="values" text="VP"></ui5-filter-item-option>
        </ui5-filter-item>
        <ui5-group-item slot="groupItems" text="Name" selected=""></ui5-group-item>
        <ui5-group-item slot="groupItems" text="Position"></ui5-group-item>
        <ui5-group-item slot="groupItems" text="Company"></ui5-group-item>
        <ui5-group-item slot="groupItems" text="Department"></ui5-group-item>
        <ui5-group-item slot="groupItems" text="(Not Grouped)"></ui5-group-item>

        <ui5-view-settings-dialog-custom-tab slot="customTabs" title-text="Preferences" tooltip="Preferences" icon="action-settings" selected>
            <div style="padding: 0.75rem; display: grid; gap: 0.75rem;">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;">
                    <span>Compact mode</span>
                    <ui5-switch id="prefCompact"></ui5-switch>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;">
                    <span>Live updates</span>
                    <ui5-switch id="prefLive" checked></ui5-switch>
                </div>
                <ui5-segmented-button id="prefDensity">
                    <ui5-segmented-button-item selected>Cozy</ui5-segmented-button-item>
                    <ui5-segmented-button-item>Compact</ui5-segmented-button-item>
                </ui5-segmented-button>
            </div>
        </ui5-view-settings-dialog-custom-tab>

        <ui5-view-settings-dialog-custom-tab slot="customTabs" title-text="Display" tooltip="Display" icon="palette">
            <div style="padding: 0.75rem; display: grid; gap: 0.75rem;">
                <ui5-segmented-button id="displayLayout">
                    <ui5-segmented-button-item selected>List</ui5-segmented-button-item>
                    <ui5-segmented-button-item>Grid</ui5-segmented-button-item>
                </ui5-segmented-button>
                <ui5-combobox id="displayTheme" placeholder="Theme">
                    <ui5-cb-item text="Default"></ui5-cb-item>
                    <ui5-cb-item text="High Contrast"></ui5-cb-item>
                    <ui5-cb-item text="Compact Light"></ui5-cb-item>
                </ui5-combobox>
                <ui5-step-input id="displayRows" min="10" max="100" value="25"></ui5-step-input>
            </div>
        </ui5-view-settings-dialog-custom-tab>
    </ui5-view-settings-dialog>
    <br />
    <br />
    <div id="vsdResults"></div>
    <!-- playground-fold -->
    <script type="module" src="main.js"></script>
</body>

</html>
<!-- playground-fold-end -->
